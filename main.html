<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Video Player</title>
<style>
  body {
    background: black; margin: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    height: 100vh;
  }
  canvas {
    background: black;
    max-width: 100vw;
    max-height: 80vh;
  }
  .controls {
    margin-top: 20px;
    display: flex; gap: 20px;
  }
  button {
    padding: 20px 40px;
    font-size: 24px;
    background: #444; color: white;
    border: none; border-radius: 10px;
    cursor: pointer;
  }
  button:disabled {
    background: #222;
    color: #777;
    cursor: default;
  }
  #errorMsg {
    color: #ff6666;
    font-size: 20px;
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }
</style>
</head>

<body>

<video id="v" playsinline muted
  style="position:absolute; left:-9999px; top:-9999px; width:1px; height:1px;"
></video>

<canvas id="c"></canvas>

<div class="controls" id="controls" style="display:none;">
  <button id="startBtn" onclick="startPlayback()">▶️ 開始播放</button>
  <button onclick="exitPage()">❌ 離開</button>
</div>

<div id="errorMsg" style="display:none;"></div>

<script>
// ============================
// ⭐ Video config map: ?id=<key>
// ============================
const videoConfig = {
  "birds":      { file: "video/birds.mp4",      maxLoop: 3 },
  "flower":     { file: "video/flower.mp4",      maxLoop: 3 },
  "seagull":    { file: "video/seagull.mp4",     maxLoop: 3 },
  "ships":      { file: "video/ships.mp4",       maxLoop: 3 },
  "wave":       { file: "video/wave.mp4",        maxLoop: 3 },
};

// ============================
// ⭐ Resolve config from ?id= param
// ============================
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const config = id ? videoConfig[id] : null;

const video   = document.getElementById("v");
const canvas  = document.getElementById("c");
const ctx     = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const controls = document.getElementById("controls");
const errorMsg  = document.getElementById("errorMsg");

let playing   = false;
let loopCount = 0;
let MAX_LOOP  = 1;

if (!config) {
  // Show error with list of valid IDs
  errorMsg.style.display = "block";
  const validIds = Object.keys(videoConfig).join("、");
  // errorMsg.innerHTML =
  //   "⚠️ 請在網址加上 <code>?id=&lt;名稱&gt;</code> 參數。<br><br>" +
  //   "可用的 id：<br>" + Object.keys(videoConfig).map(k =>
  //     `<code>?id=${encodeURIComponent(k)}</code>`
  //   ).join("&nbsp;&nbsp;");
} else {
  MAX_LOOP = config.maxLoop;
  video.innerHTML = `<source src="${config.file}" type="video/mp4">`;
  video.load();
  controls.style.display = "flex";

  // ============================
  // ⭐ 1) 載入後播放 0.1 秒抓第一幀
  // ============================
  video.addEventListener("loadedmetadata", () => {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    video.muted = true;
    video.currentTime = 0;

    video.play().then(() => {
      setTimeout(() => {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        video.pause();
        video.currentTime = 0;
      }, 120);
    });
  });

  // ============================
  // ⭐ 播放循環
  // ============================
  function draw() {
    if (playing) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(draw);
    }
  }

  video.addEventListener("ended", () => {
    loopCount++;
    if (loopCount < MAX_LOOP) {
      video.currentTime = 0;
      video.play();
    } else {
      playing = false;
      startBtn.textContent = "🔁 重複播放";
      startBtn.disabled = false;
    }
  });

  // ============================
  // ⭐ 開始播放（按鈕觸發 → 有聲音）
  // ============================
  window.startPlayback = function () {
    loopCount = 0;
    playing   = true;

    video.muted = false;
    video.currentTime = 0;
    video.play();

    draw();

    startBtn.disabled = true;
    startBtn.textContent = "▶️ 開始播放";
  };
}

// ============================
// ⭐ 離開按鈕
// ============================
window.exitPage = function () {
  window.close();
  setTimeout(() => { history.back(); }, 50);
};
</script>

</body>
</html>
